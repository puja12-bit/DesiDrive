<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Traffic Arcade Game - DesiDrive</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- MediaPipe Hands SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #000; --text-primary: #00ffff; --text-warning: #ffaa00;
            --text-danger: #ff0055; --text-success: #00ff66; --text-fuel: #ff00aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000; color: var(--text-primary);
            font-family: 'Press Start 2P', monospace; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #game-container {
            position: relative; width: 600px; height: 800px;
            max-width: 100vw; max-height: 100vh; background-color: #050505;
            overflow: hidden; border: 4px solid var(--text-primary);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            transition: box-shadow 0.1s, border-color 0.1s;
        }
        #game-container.flash-violation { border-color: #ff0000; box-shadow: inset 0 0 100px #ff0000, 0 0 100px #ff0000; }
        
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; background-color: rgba(0,0,0,0.95);
            pointer-events: auto; padding: 2rem; z-index: 50; overflow-y: auto; text-align: center;
        }
        .screen::-webkit-scrollbar { width: 10px; }
        .screen::-webkit-scrollbar-track { background: #111; }
        .screen::-webkit-scrollbar-thumb { background: var(--text-primary); border: 2px solid #111; }
        .screen.hidden { display: none; }
        
        h1 { font-size: 2.5rem; margin-top: 1rem; margin-bottom: 2rem; color: #ff0055; text-shadow: 0 0 15px #ff0055; line-height: 1.4; flex-shrink: 0;}
        h2 { font-size: 1.2rem; margin: 2rem 0 1rem; color: var(--text-warning); text-shadow: 0 0 10px var(--text-warning); }
        h3 { font-size: 0.9rem; margin: 1rem 0 0.5rem; color: var(--text-primary); text-align: left; width:100%; }
        p { font-size: 0.7rem; line-height: 2; margin-bottom: 1rem; text-align: left; width:100%; color:#aaa; }
        .center-p { text-align: center; color: var(--text-warning); }
        .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; max-width: 500px; margin: 1rem auto; }
        
        button {
            background-color: #000; border: 3px solid var(--text-primary);
            color: var(--text-primary); font-family: inherit; font-size: 0.8rem;
            padding: 1rem; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); transition: all 0.2s ease;
        }
        button:hover { background-color: var(--text-primary); color: #000; box-shadow: 0 0 25px var(--text-primary); }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        .garage-preview {
            width: 200px; height: 150px; border: 4px solid var(--text-primary); margin: 1rem auto;
            display: flex; justify-content: center; align-items: center; background: #111;
        }
        .hud-top {
            display: flex; justify-content: space-between; width: 100%; padding: 1rem;
            background: rgba(0,0,0,0.8); font-size: 0.8rem; border-bottom: 4px solid var(--text-primary);
        }
        #fuel-container { position:relative; width:150px; height:15px; border:2px solid var(--text-fuel); margin-top:5px; }
        #fuel-bar { width:100%; height:100%; background-color: var(--text-fuel); }
        .hud-indicators { position: absolute; bottom: 2rem; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 1rem; }
        .ind-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid #333; background: #0a0a0a; padding: 10px; width: 140px; opacity: 0.4;
        }
        .ind-box.active { opacity: 1; border-color: var(--text-warning); box-shadow: 0 0 30px var(--text-warning); }
        .light-bulb { width: 20px; height: 20px; background: #222; }
        .light-bulb.red.active { background: #ff0055; box-shadow: 0 0 20px #ff0055; }
        .light-bulb.yellow.active { background: #ffaa00; box-shadow: 0 0 20px #ffaa00; }
        .light-bulb.green.active { background: #00ff66; box-shadow: 0 0 20px #00ff66; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <!-- Hand Tracking UI Overlay -->
        <div id="hand-tracking-container" style="position:absolute; top:10px; right:10px; width:120px; height:90px; border:2px solid var(--text-primary); z-index:100; background:#000; overflow:hidden; opacity:0.7;">
            <video id="input-video" style="display:none;"></video>
            <canvas id="output-canvas" style="width:100%; height:100%; transform: scaleX(-1);"></canvas>
            <div id="hand-status" style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); color:#0f0; font-size:8px; text-align:center; font-family:monospace; padding:2px;">WAITING...</div>
        </div>

        <div id="ui-layer">
            <div id="garage-screen" class="screen">
                <h1>GARAGE</h1>
                <div class="garage-preview"><canvas id="garage-canvas"></canvas></div>
                <h2 id="vehicle-name">VEHICLE</h2>
                <div class="btn-group" id="vehicle-list"></div>
                <h2>MAPS</h2>
                <div class="btn-group" id="map-list" style="flex-direction:column;"></div>
                <hr style="width:80%; margin:1rem 0; border-color:#333;">
                <p id="global-score-ui" style="text-align:center; width:100%;">PTS: 0</p>
            </div>

            <div id="hud-screen" class="screen hidden" style="background:transparent; pointer-events:none; justify-content:space-between; padding:0;">
                <div class="hud-top">
                    <div>PTS: <span id="score">0</span><br>SPD: <span id="speed">0</span></div>
                    <div>FUEL<div id="fuel-container"><div id="fuel-bar"></div></div>DIST: <span id="dist">0</span></div>
                </div>
                <div class="hud-indicators">
                    <div id="ind-left-box" class="ind-box"><span>LEFT</span></div>
                    <div id="ind-right-box" class="ind-box"><span>RIGHT</span></div>
                </div>
                <div id="messages-area" style="position:absolute; top:40%; width:100%; pointer-events:none;"></div>
            </div>

            <div id="game-over-screen" class="screen hidden">
                <h1>WASTED!</h1>
                <p id="game-over-reason"></p>
                <div class="btn-group">
                    <button id="btn-restart">GARAGE</button>
                    <button id="btn-try-again">TRY AGAIN</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { HandController } from './js/HandController.js';

        // Core original arrays and sprites
        const VEHICLES = [
            { id: 'hjonda', name: 'HONDA SPLENDER', cost: 0, s: 12, a: 0.1, spColor: '#00ffff', w:10, h:16 },
            { id: 'bullett', name: 'BULLETT ENFIELD', cost: 500, s: 14, a: 0.08, spColor: '#ffaa00', w:10, h:18 },
            { id: 'ninja', name: 'NINJA ZX', cost: 3000, s: 18, a: 0.2, spColor: '#00ff66', w:10, h:16 }
        ];
        const MAPS = [
            { id: 'hyderabad', name: 'HYDERABAD BLOCKS' },
            { id: 'highway', name: 'NATIONAL HIGHWAY' },
            { id: 'offroad', name: 'MP OFF-ROAD' }
        ];

        let GLOBAL_SCORE = parseInt(localStorage.getItem('v8_score')) || 0;
        let UNLOCKED_VEHICLES = JSON.parse(localStorage.getItem('v8_vehicles')) || ['hjonda'];

        class GameEngine {
            constructor() {
                this.c = document.getElementById('game-canvas'); this.ctx = this.c.getContext('2d');
                this.c.width = 600; this.c.height = 800;
                this.keys = {}; this.handCtrl = new HandController();
                window.addEventListener('keydown', e => this.keys[e.key] = true);
                window.addEventListener('keyup', e => this.keys[e.key] = false);
                this.isPlaying = false;
                this.boundLoop = this.loop.bind(this);
            }

            startGame(vIdx, mapId) {
                this.handCtrl.start(); this.vConf = VEHICLES[vIdx]; this.mapId = mapId;
                this.isPlaying = true; this.score = 0; this.fuel = 100;
                this.p = { x: 300, y: 650, speed: 0, angle: 0, logY: 0 };
                this.em = []; this.lastTime = performance.now();
                requestAnimationFrame(this.boundLoop);
            }

            stop(reason) {
                this.isPlaying = false; GLOBAL_SCORE += Math.floor(this.score);
                localStorage.setItem('v8_score', GLOBAL_SCORE);
                document.getElementById('hud-screen').classList.add('hidden');
                document.getElementById('game-over-screen').classList.remove('hidden');
                document.getElementById('game-over-reason').innerText = reason;
            }

            update(dt) {
                this.fuel -= (dt/1000) * 1.5; if(this.fuel <= 0) return this.stop("OUT OF FUEL");
                let p = this.p;
                
                let brake = this.keys.ArrowDown || this.handCtrl.state.brake;
                let accel = this.keys.ArrowUp || this.handCtrl.state.accel;
                let st = this.handCtrl.state.steering;
                if(this.keys.ArrowLeft) st = -1; if(this.keys.ArrowRight) st = 1;

                if(accel) p.speed += this.vConf.a; else if(brake) p.speed -= 0.6; else p.speed -= 0.05;
                if(p.speed < 0) p.speed = 0; if(p.speed > this.vConf.s) p.speed = this.vConf.s;
                
                p.logY += p.speed * (dt/16); p.x += st * 5;
                if(p.x < 150) p.x=150; if(p.x > 450) p.x=450;

                // Simple collision
                if(Math.random() < 0.01) this.em.push({y: -100, x: 150+Math.random()*300});
                for(let i=this.em.length-1; i>=0; i--) {
                    this.em[i].y += 5; if(this.em[i].y > 800) this.em.splice(i,1);
                    else if(Math.abs(this.em[i].y - 650) < 30 && Math.abs(this.em[i].x - p.x) < 30) this.stop("CRASH!");
                }

                document.getElementById('score').innerText = Math.floor(this.score++);
                document.getElementById('speed').innerText = Math.floor(p.speed*10);
                document.getElementById('dist').innerText = Math.floor(p.logY);
                document.getElementById('fuel-bar').style.width = this.fuel + '%';
            }

            draw() {
                this.ctx.fillStyle = '#050505'; this.ctx.fillRect(0,0,600,800);
                this.ctx.fillStyle = '#111'; this.ctx.fillRect(150,0,300,800);
                this.ctx.fillStyle = this.vConf.spColor; this.ctx.fillRect(this.p.x-10, this.p.y-15, 20, 30);
                this.ctx.fillStyle = '#ff0000'; this.em.forEach(e => this.ctx.fillRect(e.x-10, e.y-10, 20, 20));
            }

            loop(t) {
                if(!this.isPlaying) return;
                let dt = t - (this.lastTime || t); this.lastTime = t;
                this.update(dt); this.draw(); requestAnimationFrame(this.boundLoop);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const g = new GameEngine();
            const rUI = () => {
                document.getElementById('global-score-ui').innerText = `PTS: ${GLOBAL_SCORE}`;
                const vl = document.getElementById('vehicle-list'); vl.innerHTML = '';
                VEHICLES.forEach((v, i) => {
                    const b = document.createElement('button'); b.innerText = v.name;
                    b.onclick = () => { document.getElementById('vehicle-name').innerText = v.name; };
                    vl.appendChild(b);
                });
                const ml = document.getElementById('map-list'); ml.innerHTML = '';
                MAPS.forEach(m => {
                    const mb = document.createElement('button'); mb.innerText = m.name;
                    mb.onclick = () => {
                        document.getElementById('garage-screen').classList.add('hidden');
                        document.getElementById('hud-screen').classList.remove('hidden');
                        g.startGame(0, m.id);
                    };
                    ml.appendChild(mb);
                });
            };
            document.getElementById('btn-restart').onclick = () => location.reload();
            document.getElementById('btn-try-again').onclick = () => location.reload();
            rUI();
        });
    </script>
</body>
</html>
